<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decaflow</title>
    
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="./favicon.png" type="image/png">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column; /* 이미지와 글자를 세로로 정렬 */
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; /* 애니메이션 중 스크롤바 방지 */
        }
        
        /* 중앙 회오리 로고 이미지 스타일 */
        .logo-image {
            width: 250px; /* 고정 크기로 지정하여 깨짐 방지 */
            height: 250px;
            object-fit: contain;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px; /* 이미지와 아래 글자 사이 간격 */
            
            /* 이미지용 페이드인 효과 */
            animation: fadeInOnly 1.5s ease-out forwards;
        }

        /* Decaflow 글자 스타일 */
        .logo-text {
            font-size: 6rem; 
            font-weight: 800;
            letter-spacing: -0.05em;
            color: #111111;
            
            /* 최상단에서 2.2초 동안 중앙까지 천천히 내려오는 애니메이션 */
            animation: slideDownFromTop 2.2s ease-out forwards;
            opacity: 0;
        }
        
        /* 위에서 아래로 슬라이드 + 페이드인 효과 정의 */
        @keyframes slideDownFromTop {
            from {
                opacity: 0;
                transform: translateY(-100vh); /* 화면 최상단 바깥에서 시작 */
            }
            to {
                opacity: 1;
                transform: translateY(0); /* 중앙 정위치 */
            }
        }

        /* 이미지 전용 페이드인 정의 */
        @keyframes fadeInOnly {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <img src="./logo.png" alt="Decaflow Logo" class="logo-image">

    <div class="logo-text">Decaflow</div>

</body>
</html>
