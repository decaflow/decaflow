<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decaflow</title>
    
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column; /* 이미지와 텍스트를 세로로 정렬 */
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; /* 애니메이션 중 스크롤바 방지 */
        }
        
        /* 다채로운 로고 이미지 설정 */
        .logo-image {
            width: auto;
            max-width: 250px; /* 이미지 크기 조절 */
            height: auto;
            max-height: 250px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px; /* 로고와 글자 사이 간격 */
            
            /* 이미지도 함께 부드럽게 나타나도록 설정 */
            animation: fadeIn 1.5s ease-out forwards;
        }

        /* Decaflow 글자 설정 */
        .logo-text {
            font-size: 6rem; 
            font-weight: 800;
            letter-spacing: -0.05em;
            color: #111111;
            
            /* 최상단에서 중앙까지 2.2초 동안 천천히 내려오는 애니메이션 */
            animation: slideDownFadeIn 2.2s ease-out forwards;
            
            opacity: 0;
            transform: translateY(-100vh); /* 화면 최상단 밖에서 시작 */
        }
        
        /* 위에서 아래로 슬라이드 + 페이드인 애니메이션 */
        @keyframes slideDownFadeIn {
            from {
                opacity: 0;
                transform: translateY(-100vh); /* 최상단 시작점 */
            }
            to {
                opacity: 1;
                transform: translateY(0); /* 중앙 정위치 */
            }
        }

        /* 이미지용 기본 페이드인 효과 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <img src="./logo.png" alt="Decaflow Logo" class="logo-image">

    <div class="logo-text">Decaflow</div>

</body>
</html>
