<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecaFlow</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; /* 애니메이션 중 스크롤바 방지 */
        }
        .logo {
            /* 글씨 크기 50% 확대: 기존 4rem -> 6rem */
            font-size: 6rem; 
            font-weight: 800;
            letter-spacing: -0.05em;
            color: #111111;
            
            /* 위에서 아래로 슬라이드하며 나타나는 애니메이션 적용 */
            animation: slideDownFadeIn 1.5s ease-out forwards;
            
            /* 초기 상태: 위쪽에 위치하고 투명함 */
            opacity: 0;
            transform: translateY(-50px); 
        }
        
        /* 위에서 아래로 슬라이드 + 페이드인 애니메이션 정의 */
        @keyframes slideDownFadeIn {
            from {
                opacity: 0;
                transform: translateY(-100%); /* 화면 위쪽에서 시작 */
            }
            to {
                opacity: 1;
                transform: translateY(0); /* 정위치로 이동 */
            }
        }
    </style>
</head>
<body>

    <div class="logo">DecaFlow</div>

</body>
</html>
