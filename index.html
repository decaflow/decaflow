<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecaFlow</title>
    
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="./favicon.png" type="image/png">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column; /* 이미지와 글자를 세로로 정렬 */
            justify-content: center;
            align-items: center;
            background-color: #ffffff; /* 완전한 화이트 배경 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; /* 애니메이션 중 스크롤바 방지 */
        }
        
        /* 중앙 회오리 로고 이미지 가리기 스타일 */
        .logo-image-container {
            width: 250px;
            height: 250px;
            border-radius: 50%; /* 로고 외곽 격자무늬를 동그랗게 잘라내기 위함 */
            background-color: #ffffff; /* 격자무늬 배경을 완전한 흰색으로 가림 */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px; /* 이미지와 아래 글자 사이 간격 */
            
            /* 이미지 전용 페이드인 효과 */
            animation: fadeInOnly 1.5s ease-out forwards;
        }

        .logo-image {
            width: 108%; /* 격자무늬 테두리가 안 보이도록 미세하게 확대 크롭 */
            height: 108%;
            object-fit: cover;
        }

        /* Decaflow 글자 스타일 */
        .logo-text {
            font-size: 6rem; 
            font-weight: 800;
            letter-spacing: -0.05em;
            color: #111111;
            
            /* 최상단에서 2.4초 동안 중앙까지 천천히 내려오는 애니메이션 */
            animation: slideDownFromTop 2.4s ease-out forwards;
            opacity: 0;
        }
        
        /* 위에서 아래로 슬라이드 + 페이드인 효과 정의 */
        @keyframes slideDownFromTop {
            from {
                opacity: 0;
                transform: translateY(-100vh); /* 화면 최상단 바깥에서 시작 */
            }
            to {
                opacity: 1;
                transform: translateY(0); /* 중앙 정위치 */
            }
        }

        /* 이미지 전용 페이드인 정의 */
        @keyframes fadeInOnly {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="logo-image-container">
        <img src="./logo.png" alt="Decaflow Logo" class="logo-image">
    </div>

    <div class="logo-text">DecaFlow</div>

</body>
</html>
