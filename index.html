<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecaFlow</title>
    
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* DecaFlow의 역동적인 느낌을 살린 세련된 미니멀 배경 그라데이션 */
            background: radial-gradient(circle at center, #ffffff 0%, #f4f5f7 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden; /* 애니메이션 중 스크롤바 방지 */
        }
        
        .logo {
            /* 글씨 크기 6rem */
            font-size: 6rem; 
            font-weight: 900; /* 조금 더 두껍게 변경하여 임팩트 부여 */
            letter-spacing: -0.06em; /* 자간을 조금 더 좁혀서 단단한 느낌 부여 */
            color: #111111;
            
            /* 고급스러운 입체감을 위한 미세한 텍스트 그림자 */
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            
            /* 초기 상태 */
            opacity: 0;
            
            /* 위에서 아래로 떨어지며 자연스럽게 안착하는 cubic-bezier 애니메이션 */
            animation: slideDownFadeIn 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        /* 세련된 슬라이드 + 페이드인 애니메이션 정의 */
        @keyframes slideDownFadeIn {
            from {
                opacity: 0;
                transform: translateY(-80px) scale(0.95); /* 살짝 작아진 상태에서 내려옴 */
                filter: blur(4px); /* 트렌디한 모션블러 효과 살짝 추가 */
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }
    </style>
</head>
<body>

    <div class="logo">DecaFlow</div>

</body>
</html>
