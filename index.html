<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>decaflow</title>
    
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; /* 애니메이션 중 스크롤바 방지 */
        }
        
        /* 다채로운 로고 이미지(`image_24.png`)에 애니메이션 적용 */
        .logo-image {
            /* 로고 크기 조정: 필요시 이 부분을 수정하세요. */
            width: auto;
            max-width: 400px; /* 로고의 최대 너비 */
            height: auto;
            max-height: 400px; /* 로고의 최대 높이 */
            
            /* 테두리 및 쉐도우 (깔끔하게 보이게 하기 위함) */
            border-radius: 20px; /* 로고 테두리 곡률 */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); /* 미세한 그림자 */
            
            /* 위에서 아래로 슬라이드하며 나타나는 애니메이션 정의 */
            /* 시간을 2.2s로 수정 */
            animation: slideDownFadeIn 2.2s ease-out forwards;
            
            /* 초기 상태: 위쪽에 위치하고 투명함 */
            opacity: 0;
            transform: translateY(-50px); 
        }
        
        /* 위에서 아래로 슬라이드 + 페이드인 애니메이션 정의 */
        @keyframes slideDownFadeIn {
            from {
                opacity: 0;
                transform: translateY(-100%); /* 화면 위쪽에서 시작 */
            }
            to {
                opacity: 1;
                transform: translateY(0); /* 정위치로 이동 */
            }
        }
    </style>
</head>
<body>

    <img src="./favicon.ico" alt="Decaflow Logo" class="logo-image">

</body>
</html>
